<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>X01 · Darts</title>
<link rel="stylesheet" href="../common.css">
<style>
  /* ── Player selection slots (same component cricket.html uses — there's
     no shared place for this yet, so each page that needs buildPlayerSlot()
     keeps its own copy, same as profile.html/stats.html do for escapeHtml()
     below) ── */
  .ps-slot {
    position: relative;
    margin-bottom: 0.6rem;
  }
  .ps-selected {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 0.35rem;
    padding: 0.55rem 0.8rem;
    cursor: pointer;
    font-size: 0.85rem;
    letter-spacing: 0.06em;
    color: var(--text-dim);
  }
  .ps-selected:active { opacity: 0.7; }
  /* Amber instead of cricket's red, to match this page's accent color */
  .ps-chosen-filled { color: var(--led-amber); }
  .ps-caret { font-size: 0.7rem; color: var(--text-dim); }
  .ps-dropdown {
    position: absolute;
    left: 0; right: 0;
    background: var(--panel);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 0.35rem 0.35rem;
    z-index: 100;
    max-height: 280px;
    overflow-y: auto;
  }
  .ps-search {
    display: block;
    width: 100%;
    box-sizing: border-box;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    color: var(--text-bright);
    font-family: var(--seg);
    font-size: 0.8rem;
    padding: 0.5rem 0.8rem;
    outline: none;
    letter-spacing: 0.06em;
  }
  .ps-row {
    padding: 0.55rem 0.8rem;
    font-size: 0.82rem;
    letter-spacing: 0.05em;
    color: var(--text-bright);
    cursor: pointer;
  }
  .ps-row:active, .ps-row:hover { background: var(--border); }
  .ps-guest   { color: var(--text-dim); font-style: italic; }
  .ps-add-new { color: var(--led-amber); border-top: 1px solid var(--border); }
  .ps-new-form {
    padding: 0.6rem 0.8rem 0.8rem;
    border-top: 1px solid var(--border);
    background: var(--bg);
  }
  .ps-new-hint {
    font-size: 0.6rem;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    margin: 0.3rem 0 0.2rem;
  }
  .ps-new-cancel {
    background: none;
    border: none;
    color: var(--text-dim);
    font-family: var(--seg);
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    padding: 0.3rem 0;
    cursor: pointer;
    display: block;
    margin-top: 0.2rem;
  }

  /* ── Win overlay stats table (same as cricket.html) ── */
  .win-stats {
    margin-top: 0.8rem;
    width: 100%;
    font-size: 0.78rem;
    border-collapse: collapse;
  }
  .win-stats td {
    padding: 0.2rem 0.5rem;
    text-align: center;
    color: var(--text-dim);
  }
  .win-stats .ws-name { font-size: 0.7rem; letter-spacing: 0.06em; }
  .win-stats .ws-val  { color: var(--text-bright); font-size: 0.88rem; }
  .win-stats .ws-avg  { color: var(--text-dim); font-size: 0.68rem; }

  /* ── x01-specific additions (new) ── */
  /* Darts-thrown + running-PPD readout in the scoreboard's right column */
  .x01-ppd-lbl {
    font-size: 0.6rem;
    color: var(--text-dim);
    letter-spacing: 0.04em;
    margin-bottom: 0.3rem;
  }
  /* Shown under a player's score while they still need to satisfy
     double-in / master-in before their darts start counting */
  .x01-need-in {
    font-size: 0.6rem;
    color: var(--led-amber);
    letter-spacing: 0.05em;
    margin-top: 0.15rem;
  }
</style>

<script src="../sfx.js"></script>
<script src="../utils.js"></script>
<script src="../players.js"></script>
</head>
<body>

<!-- ══════════════════════════════════════
     SETUP SCREEN
══════════════════════════════════════ -->
<div id="setup-screen" class="setup-wrap">

  <div class="setup-top">
    <a class="back-btn" href="../index.html">◂ HUB</a>
    <div class="setup-title amber" id="setup-title">501</div>
  </div>

  <!-- ── Player count: 1–4 ── -->
  <div class="s-section">
    <span class="s-label">[ PLAYERS ]</span>
    <div class="chip-row" id="player-chips">
      <div class="chip" data-n="1">1</div>
      <div class="chip on amber" data-n="2">2</div>
      <div class="chip" data-n="3">3</div>
      <div class="chip" data-n="4">4</div>
    </div>
  </div>

  <!-- ── Player selection slots (dropdowns, built by players.js) ── -->
  <div class="s-section">
    <span class="s-label">[ SELECT PLAYERS ]</span>
    <div id="player-slots"></div>
  </div>

  <!-- ── Variant: 301 / 501 / 701 ── -->
  <div class="s-section">
    <span class="s-label">[ VARIANT ]</span>
    <div class="chip-row" id="variant-chips">
      <div class="chip" data-s="301">301</div>
      <div class="chip on amber" data-s="501">501</div>
      <div class="chip" data-s="701">701</div>
    </div>
  </div>

  <!-- ── In mode ── -->
  <div class="s-section">
    <span class="s-label">[ IN ]</span>
    <div class="chip-row" id="in-chips">
      <div class="chip on amber" data-mode="single">SINGLE</div>
      <div class="chip" data-mode="double">DOUBLE</div>
      <div class="chip" data-mode="master">MASTER</div>
    </div>
  </div>

  <!-- ── Out mode ── -->
  <div class="s-section">
    <span class="s-label">[ OUT ]</span>
    <div class="chip-row" id="out-chips">
      <div class="chip" data-mode="single">SINGLE</div>
      <div class="chip on amber" data-mode="double">DOUBLE</div>
      <div class="chip" data-mode="master">MASTER</div>
    </div>
  </div>

  <!-- ── Round limit ── -->
  <div class="s-section">
    <span class="s-label">[ ROUND LIMIT ]</span>
    <div class="row2">
      <input class="led-input-sm" type="number" id="max-rounds" value="0" min="0" max="99">
      <span class="row2-hint">max rounds per player<br>0 = unlimited</span>
    </div>
  </div>

  <button class="btn-start amber" id="start-btn">[ START GAME ]</button>
  <button class="btn-resume" id="resume-btn" style="display:none">[ RESUME SAVED ]</button>

</div>

<!-- ══════════════════════════════════════
     GAME SCREEN
══════════════════════════════════════ -->
<div id="game-screen" class="game-wrap" style="display:none">

  <div class="top-bar amber-bar">
    <div style="display:flex;align-items:center">
      <span class="game-logo amber" id="game-logo">501</span>
      <span class="r-badge" id="r-badge">R1</span>
    </div>
    <div class="top-btns">
      <button class="theme-btn" id="theme-btn">☀</button>
      <button class="top-btn" id="save-btn">SAVE</button>
      <button class="top-btn danger" id="end-btn">END</button>
    </div>
  </div>

  <div class="last-bar" id="last-bar">*** FINAL ROUND ***</div>

  <div class="game-scroll">
    <div class="x01-scores" id="score-board"></div>
  </div>

  <div class="input-panel amber-panel">
    <div class="turn-row">
      <div>
        <div class="turn-lbl">NOW THROWING</div>
        <div class="turn-name" id="turn-name">---</div>
      </div>
      <div class="throw-slots">
        <div class="tslot" id="ts0"></div>
        <div class="tslot" id="ts1"></div>
        <div class="tslot" id="ts2"></div>
      </div>
    </div>

    <div class="mult-row" id="mult-row">
      <button class="mbtn active" data-m="1">SINGLE</button>
      <button class="mbtn" data-m="2">DOUBLE</button>
      <button class="mbtn" data-m="3">TRIPLE</button>
    </div>

    <div class="tgt-grid" id="tgt-grid"></div>

    <div class="act-row">
      <button class="btn-undo" id="undo-btn">UNDO</button>
      <button class="btn-next amber" id="next-btn">NEXT ››</button>
    </div>
  </div>

</div>

<!-- Shared win overlay -->
<div id="win-overlay">
  <div class="win-icon">🎯</div>
  <div style="text-align:center">
    <div class="win-lbl">WINNER</div>
    <div class="win-name" id="win-name">---</div>
  </div>
  <div class="win-sub" id="win-sub"></div>
  <div class="win-btns">
    <button class="btn-start amber" id="win-new-btn" style="font-size:1rem;padding:0.8rem">NEW GAME</button>
    <button class="btn-resume" onclick="document.getElementById('win-overlay').classList.remove('show')">VIEW BOARD</button>
  </div>
</div>

<div class="bust-flash" id="bust-flash"></div>
<div id="toast"></div>
<script>
'use strict';

/* ══════════════════════════════════════
   INIT — theme
══════════════════════════════════════ */
initTheme();
document.addEventListener('DOMContentLoaded', () => {
  const tb = document.getElementById('theme-btn');
  if (tb) tb.addEventListener('click', () => { toggleTheme(); SFX.hit(); });
});

/* ── Small safety helper: escapes player-typed text before it goes into
   innerHTML, so a name like "<b>Bob</b>" can't break the page layout.
   (Duplicated locally on purpose, same as profile.html/stats.html do —
   there's no shared utils home for it yet.) ── */
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str == null ? '' : String(str);
  return div.innerHTML;
}

/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
let G    = {};
let mult = 1;

let selN     = 2;
let selScore = 501;
let selIn    = 'single';
let selOut   = 'double';

/* ── Player slot state (identical pattern to cricket.html) ──────────────────
   slots[] holds the return value of buildPlayerSlot() for each player
   position. Each slot has .getPid() and .getName(). */
let slots = [];

function allSlotStates() {
  return slots.map(s => ({
    pid:  s ? s.getPid()  : null,
    name: s ? s.getName() : '',
  }));
}

// rebuildSlotsPreservingSelections()
// Renders selN player-selection dropdowns into #player-slots. Called on
// page load and whenever the player-count chip changes. The 4th argument
// to buildPlayerSlot is an onChange callback fired whenever a slot's pick
// changes — we pass a no-op (see onSlotChange below for why).
function rebuildSlotsPreservingSelections() {
  const n = selN;
  slots = [];
  const container = document.getElementById('player-slots');
  container.innerHTML = '';

  for (let i = 0; i < n; i++) {
    const wrapper = document.createElement('div');
    wrapper.style.marginBottom = '0.4rem';
    container.appendChild(wrapper);

    const slot = buildPlayerSlot(wrapper, i, allSlotStates, onSlotChange);
    slots.push(slot);
  }
}

// onSlotChange() — intentionally empty. Each slot keeps its own selection
// in a local variable inside buildPlayerSlot(); rebuilding here would wipe
// that the instant a player picked someone. Sibling exclusion still works
// because every slot calls allSlotStates() fresh each time IT opens.
function onSlotChange() {}

/* ══════════════════════════════════════
   SETUP — player count chips
══════════════════════════════════════ */
document.getElementById('player-chips').addEventListener('click', e => {
  const c = e.target.closest('.chip'); if (!c) return;
  selN = +c.dataset.n;
  document.querySelectorAll('#player-chips .chip').forEach(x => {
    x.classList.toggle('on', x === c);
    x.classList.toggle('amber', x === c);
  });
  rebuildSlotsPreservingSelections();
});

/* ══════════════════════════════════════
   SETUP — variant chips (301 / 501 / 701)
   Each variant gets its OWN save slot (see saveKeyFor below), so picking
   a different variant here also means re-checking whether THAT variant
   has a paused game to resume.
══════════════════════════════════════ */
function applyScoreChip(score) {
  selScore = score;
  document.getElementById('setup-title').textContent = score;
  document.querySelectorAll('#variant-chips .chip').forEach(c => {
    const match = +c.dataset.s === score;
    c.classList.toggle('on', match);
    c.classList.toggle('amber', match);
  });
  refreshResumeVisibility();
}

document.getElementById('variant-chips').addEventListener('click', e => {
  const c = e.target.closest('.chip'); if (!c) return;
  applyScoreChip(+c.dataset.s);
});

/* ══════════════════════════════════════
   SETUP — in / out mode chips
══════════════════════════════════════ */
function applyInChip(mode) {
  selIn = mode;
  document.querySelectorAll('#in-chips .chip').forEach(c => {
    const match = c.dataset.mode === mode;
    c.classList.toggle('on', match);
    c.classList.toggle('amber', match);
  });
}
function applyOutChip(mode) {
  selOut = mode;
  document.querySelectorAll('#out-chips .chip').forEach(c => {
    const match = c.dataset.mode === mode;
    c.classList.toggle('on', match);
    c.classList.toggle('amber', match);
  });
}
document.getElementById('in-chips').addEventListener('click', e => {
  const c = e.target.closest('.chip'); if (!c) return;
  applyInChip(c.dataset.mode);
});
document.getElementById('out-chips').addEventListener('click', e => {
  const c = e.target.closest('.chip'); if (!c) return;
  applyOutChip(c.dataset.mode);
});

/* ══════════════════════════════════════
   SAVE KEY — one per variant
   x01_301 / x01_501 / x01_701, so a paused 501 game and a paused 301
   game can both sit untouched at the same time.
══════════════════════════════════════ */
function saveKeyFor(score) {
  return `x01_${score}`;
}

function refreshResumeVisibility() {
  try {
    document.getElementById('resume-btn').style.display =
      localStorage.getItem(saveKeyFor(selScore)) ? '' : 'none';
  } catch (e) {
    document.getElementById('resume-btn').style.display = 'none';
  }
}

/* ══════════════════════════════════════
   BOOT
══════════════════════════════════════ */
// Read ?start= from the hub link (e.g. games/x01.html?start=501).
// Falls back to 501 if missing or not one of the 3 supported variants.
const VALID_VARIANTS = [301, 501, 701];
let urlStart = parseInt(new URLSearchParams(location.search).get('start')) || 501;
if (!VALID_VARIANTS.includes(urlStart)) urlStart = 501;
applyScoreChip(urlStart);

document.addEventListener('DOMContentLoaded', () => {
  rebuildSlotsPreservingSelections();
  refreshResumeVisibility();
});

/* ══════════════════════════════════════
   START / RESUME
══════════════════════════════════════ */
document.getElementById('start-btn').addEventListener('click', () => {
  // Validate every player slot has a selection (same as cricket.html)
  const selections = allSlotStates();
  for (let i = 0; i < selN; i++) {
    if (!selections[i] || !selections[i].pid) {
      toast(`SELECT PLAYER ${i + 1}`); return;
    }
  }

  G = freshState();
  G.players    = selections.slice(0, selN).map(s => s.name);
  G.playerPids = selections.slice(0, selN).map(s => s.pid);
  G.startScore = selScore;
  G.inMode     = selIn;
  G.outMode    = selOut;
  G.variant    = `${selScore}-${selIn}-in-${selOut}-out`;
  G.maxRounds  = +document.getElementById('max-rounds').value;

  G.players.forEach(p => {
    G.scores[p]      = selScore;
    G.dartsThrown[p] = 0;
    // Single-in players are "open" from the first dart — only double-in
    // and master-in players have to earn it.
    G.hasOpened[p]   = selIn === 'single';
    G.history[p]     = [];
  });

  G.turnStartScore = G.scores[G.players[0]];
  G.openedThisTurn = false;

  launch();
});

document.getElementById('resume-btn').addEventListener('click', () => {
  try {
    G = JSON.parse(localStorage.getItem(saveKeyFor(selScore)));
    launch();
  } catch (e) { toast('LOAD ERROR'); }
});

function freshState() {
  return {
    players: [], playerPids: [],
    startScore: 501, inMode: 'single', outMode: 'double', variant: '',
    maxRounds: 0,
    scores: {}, dartsThrown: {}, hasOpened: {}, history: {},
    currentPlayer: 0, currentThrows: [],
    turnStartScore: 0,
    openedThisTurn: false,
    round: 1, undoStack: []
  };
}

/* ══════════════════════════════════════
   LAUNCH
══════════════════════════════════════ */
function launch() {
  mult = 1;
  document.getElementById('game-logo').textContent = G.startScore;
  buildTargetGrid();
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('game-screen').style.display  = 'flex';
  renderAll();
}

/* ── Target grid: numbers 1–20, BULL, MISS. Built once per launch. ── */
function buildTargetGrid() {
  const g = document.getElementById('tgt-grid');
  g.innerHTML = '';
  for (let n = 1; n <= 20; n++) {
    const b = document.createElement('button');
    b.className   = 'tbtn x01';
    b.textContent = n;
    b.addEventListener('click', () => doThrow(n, mult));
    g.appendChild(b);
  }
  const bull = document.createElement('button');
  bull.className   = 'tbtn x01 bull';
  bull.textContent = 'BULL';
  bull.addEventListener('click', () => doThrow(25, mult));
  g.appendChild(bull);

  const miss = document.createElement('button');
  miss.className   = 'tbtn miss-btn';
  miss.textContent = 'MISS';
  miss.addEventListener('click', () => doThrow(null, 0));
  g.appendChild(miss);
}

/* ══════════════════════════════════════
   RENDER
══════════════════════════════════════ */
function renderAll() {
  renderBoard();
  renderSlots();
  renderTurnName();
  renderBadge();
}

function renderBoard() {
  const cp    = G.players[G.currentPlayer];
  const board = document.getElementById('score-board');
  board.innerHTML = '';

  G.players.forEach(p => {
    const rem         = G.scores[p];
    const isActive    = p === cp;
    const dartsThrown = G.dartsThrown[p] || 0;
    // pointsScored is DERIVED (startScore minus what's left), not tracked
    // separately — see the big comment above doThrow() for why that's safe.
    const pointsScored = G.startScore - rem;
    const ppd           = dartsThrown > 0 ? (pointsScored / dartsThrown).toFixed(2) : '0.00';
    const hist           = (G.history[p] || []).slice(-3);

    const histHtml = hist.map(h =>
      h.bust
        ? `<span class="bust-hist">BUST</span>`
        : `<span>${h.total > 0 ? '-' + h.total : '—'}</span>`
    ).join('<br>');

    const needsIn   = G.inMode !== 'single' && !G.hasOpened[p];
    const needBadge = needsIn
      ? `<div class="x01-need-in">NEED ${G.inMode.toUpperCase()} IN</div>`
      : '';

    const row = document.createElement('div');
    row.className = `x01-player-row${isActive ? ' active-row' : ''}`;
    row.innerHTML = `
      <div class="x01-left">
        <div class="x01-pname">${escapeHtml(p)}</div>
        <div class="x01-remaining${rem <= 50 ? ' danger' : ''}">${rem}</div>
        ${needBadge}
      </div>
      <div class="x01-right">
        <div class="x01-ppd-lbl">${dartsThrown}D · ${ppd}PPD</div>
        <div class="x01-round-hist">${histHtml}</div>
      </div>`;
    board.appendChild(row);
  });
}

function renderSlots() {
  for (let i = 0; i < 3; i++) {
    const sl = document.getElementById(`ts${i}`);
    const th = G.currentThrows[i];
    if (th === undefined) {
      sl.textContent = ''; sl.className = 'tslot';
    } else if (th === null) {
      sl.textContent = 'MISS'; sl.className = 'tslot miss';
    } else if (th.bust) {
      sl.textContent = 'BUST'; sl.className = 'tslot bust';
    } else {
      const lbl = th.mult > 1
        ? `${th.mult}×${th.val === 25 ? 'B' : th.val}`
        : (th.val === 25 ? 'BULL' : String(th.val));
      sl.textContent = lbl;
      // noScore = hit something before opening the innings (double/master-in
      // not yet satisfied) — styled like a miss since it didn't count.
      sl.className = th.noScore ? 'tslot miss' : 'tslot hit';
    }
  }
}

function renderTurnName() {
  document.getElementById('turn-name').textContent = G.players[G.currentPlayer];
}

function renderBadge() {
  const mx = G.maxRounds, r = G.round;
  document.getElementById('r-badge').textContent = mx > 0 ? `R${r}/${mx}` : `R${r}`;
  document.getElementById('last-bar').classList.toggle('show', mx > 0 && r === mx);
}

/* ══════════════════════════════════════
   UNDO — pushHistory() snapshots full state before every dart, MISS, or
   manual NEXT. (x01 doesn't need cricket's tapPending/tapCount — every
   dart here is already unambiguous the moment SINGLE/DOUBLE/TRIPLE is
   picked, so there's no "pending tap" state to capture.)
══════════════════════════════════════ */
function pushHistory() {
  G.undoStack.push({
    scores:         JSON.parse(JSON.stringify(G.scores)),
    dartsThrown:    JSON.parse(JSON.stringify(G.dartsThrown)),
    hasOpened:      JSON.parse(JSON.stringify(G.hasOpened)),
    history:        JSON.parse(JSON.stringify(G.history)),
    currentThrows:  JSON.parse(JSON.stringify(G.currentThrows)),
    currentPlayer:  G.currentPlayer,
    round:          G.round,
    turnStartScore: G.turnStartScore,
    openedThisTurn: G.openedThisTurn,
  });
}

/* ══════════════════════════════════════
   THROW LOGIC
   ────────────────────────────────────────────────────────────────────────
   val → number hit (1-20, or 25 for bull). null = MISS.
   m   → multiplier: 1 single / 2 double / 3 triple. 0 = MISS.

   Three rules interact here, so here's the order this function checks
   them in:

   1. IN-MODE — if the player hasn't opened their innings yet (only
      possible under double-in or master-in; single-in players start
      "open"), this dart only opens them if it qualifies (a double for
      double-in; a double OR triple for master-in). A hit that doesn't
      qualify still uses up a dart but changes nothing else.

   2. BUST — going below 0, landing on exactly 1 under double/master-out
      (no dart can ever turn 1 into 0 while satisfying either of those),
      or landing on exactly 0 without the right multiplier for the
      out-mode, all bust the turn.

      Per your call on the standard rule: a bust voids the WHOLE turn,
      not just the one dart that caused it. So we revert the score all
      the way back to turnStartScore (what it was when this player's
      turn began) — wiping out any earlier darts this turn too. If the
      very dart that opened this player's innings happened earlier in
      THIS SAME turn, that gets undone as well (tracked via
      G.openedThisTurn, since by the time a bust happens we're often a
      dart or two past the one that actually opened them).

   3. CHECKOUT — landing on exactly 0 WITH the right multiplier for the
      out-mode wins the leg immediately.

   pointsScored is never tracked as its own running total — seeing
   exactly why is the key to understanding this whole function: because
   a bust always reverts G.scores[player] back to turnStartScore, the
   value "startScore minus whatever's currently left" is ALWAYS exactly
   equal to the points that have validly stuck so far. There's nothing
   to keep in sync and nothing to roll back separately — reverting the
   score on a bust handles it automatically.
══════════════════════════════════════ */
function doThrow(val, m) {
  if (G.currentThrows.length >= 3) { toast('END TURN FIRST'); return; }

  pushHistory(); // snapshot BEFORE this dart changes anything

  const cp = G.players[G.currentPlayer];
  // Every dart counts toward darts-thrown for PPD — miss, bust, and
  // not-yet-open darts included, exactly like a real 3-dart average.
  G.dartsThrown[cp] = (G.dartsThrown[cp] || 0) + 1;

  /* ── MISS ── */
  if (val === null || m === 0) {
    SFX.miss();
    G.currentThrows.push(null);
    mult = 1;
    renderAll();
    return;
  }

  const rawPoints   = val * m;
  const isDoubleHit = m === 2; // also covers "double bull": val=25, m=2 → 50
  const isTripleHit = m === 3;

  /* ── 1. IN-MODE CHECK ── */
  if (!G.hasOpened[cp]) {
    const qualifiesToOpen =
      (G.inMode === 'double' && isDoubleHit) ||
      (G.inMode === 'master' && (isDoubleHit || isTripleHit));

    if (!qualifiesToOpen) {
      // Hit something, but it didn't open the innings — no score change,
      // dart's still used up.
      SFX.hit();
      G.currentThrows.push({ val, mult: m, bust: false, noScore: true });
      mult = 1;
      renderAll();
      return;
    }

    G.hasOpened[cp]  = true;
    G.openedThisTurn = true; // remember in case a LATER dart this turn busts
  }

  const cur      = G.scores[cp];
  const newScore = cur - rawPoints;

  /* ── 2. BUST (shared cleanup for every way a turn can go bust) ── */
  function handleBust() {
    SFX.bust();
    bustFlash();
    G.currentThrows.push({ val, mult: m, bust: true });
    G.scores[cp] = G.turnStartScore;            // void the WHOLE turn
    if (G.openedThisTurn) G.hasOpened[cp] = false; // undo the open too, if it happened this turn
    mult = 1;
    renderAll();
    setTimeout(() => nextPlayer(true), 900);
  }

  if (newScore < 0) { handleBust(); return; }                             // overshot
  if (newScore === 1 && G.outMode !== 'single') { handleBust(); return; } // can never finish from 1 on double/master-out

  if (newScore === 0) {
    const validFinish =
      G.outMode === 'single' ||
      (G.outMode === 'double' && isDoubleHit) ||
      (G.outMode === 'master' && (isDoubleHit || isTripleHit));

    if (!validFinish) { handleBust(); return; } // hit zero, but not with a qualifying dart

    /* ── 3. CHECKOUT ── */
    SFX.checkout();
    G.scores[cp] = 0;
    G.currentThrows.push({ val, mult: m, bust: false });
    if (!G.history[cp]) G.history[cp] = [];
    G.history[cp].push({ total: rawPoints, bust: false });
    mult = 1;
    renderAll();
    setTimeout(() => {
      finishGame(cp, G.currentPlayer, `CHECKOUT  ${cur} → 0`, true);
    }, 300);
    return;
  }

  // ── Normal scoring dart ──
  if      (m === 3) SFX.triple();
  else if (m === 2) SFX.double();
  else              SFX.hit();

  G.scores[cp] = newScore;
  G.currentThrows.push({ val, mult: m, bust: false });
  mult = 1;
  renderAll();
}

/* ══════════════════════════════════════
   NEXT PLAYER
   fromBust=true is the auto-advance 900ms after a bust — doThrow() already
   took an undo snapshot right before the busting dart, so we deliberately
   DON'T push another one here. That way a single UNDO after a bust takes
   you straight back to "about to throw that dart again", instead of
   needing two presses to undo the bust-then-rotate as separate steps.
══════════════════════════════════════ */
function nextPlayer(fromBust) {
  if (!fromBust) pushHistory();

  const cp = G.players[G.currentPlayer];
  if (!G.history[cp]) G.history[cp] = [];

  if (fromBust) {
    G.history[cp].push({ total: 0, bust: true });
  } else {
    const total = G.currentThrows.reduce((s, th) => {
      if (!th || th.bust || th.noScore) return s;
      return s + th.val * th.mult;
    }, 0);
    G.history[cp].push({ total, bust: false });
  }

  SFX.next();
  G.currentThrows = [];
  G.currentPlayer = (G.currentPlayer + 1) % G.players.length;

  // New current player's turn starts now — remember their score so a
  // later bust THIS turn knows what to revert back to.
  G.turnStartScore = G.scores[G.players[G.currentPlayer]];
  G.openedThisTurn = false;

  if (G.currentPlayer === 0) {
    G.round++;
    if (G.maxRounds > 0 && G.round > G.maxRounds) { endByLimit(); return; }
  }
  mult = 1;
  renderAll();
  save();
}

function endByLimit() {
  // Leader = whoever has scored the most so far (startScore - remaining).
  // Ties go to whoever has the lower remaining score.
  let winner = G.players[0];
  let bestScored = -Infinity;
  G.players.forEach(p => {
    const scored = G.startScore - G.scores[p];
    if (scored > bestScored) { bestScored = scored; winner = p; }
  });
  const winnerIdx = G.players.indexOf(winner);
  finishGame(winner, winnerIdx, `ROUND LIMIT  ${G.scores[winner]} LEFT`, false);
}

/* ══════════════════════════════════════
   WIN / GAME-END — logs the game and shows the stats overlay.
   Used for both a real checkout AND a round-limit ending, so every
   completed x01 game ends up in darts_games either way.
══════════════════════════════════════ */
function finishGame(winnerName, winnerIdx, subText, isCheckout) {
  // ── 1. Build results for logGame() ──
  const results = {};
  G.players.forEach((p, i) => {
    const pid          = G.playerPids[i];
    const dartsThrown  = G.dartsThrown[p] || 0;
    const pointsScored = G.startScore - G.scores[p];
    const ppd          = dartsThrown > 0 ? +(pointsScored / dartsThrown).toFixed(2) : 0;
    results[pid] = {
      pointsScored,
      dartsThrown,
      ppd,
      checkout: !!(isCheckout && p === winnerName),
    };
  });

  const record = {
    gameType: 'x01',
    variant:  G.variant,
    players:  G.players.map((name, i) => ({ pid: G.playerPids[i], name })),
    winner:   G.playerPids[winnerIdx],
    results,
  };

  // logGame is defined in players.js — saves to darts_games and updates
  // each non-guest player's lastPlayed/playCount.
  logGame(record);

  // ── 2. Stats table for the win overlay: this game's PPD + career PPD
  // and win/loss record for THIS exact variant ──
  let statsHtml = '<table class="win-stats"><tr>';
  G.players.forEach(p => { statsHtml += `<td class="ws-name">${escapeHtml(p)}</td>`; });
  statsHtml += '</tr><tr>';

  G.players.forEach((p, i) => {
    const r = results[G.playerPids[i]];
    statsHtml += `<td class="ws-val">${r.ppd} PPD</td>`;
  });
  statsHtml += '</tr><tr>';

  G.players.forEach((p, i) => {
    const pid = G.playerPids[i];
    if (pid === GUEST_PID) {
      statsHtml += `<td class="ws-avg">no history</td>`;
      return;
    }
    // getCareerPPD is from players.js; getCareerWinLossX01 is below —
    // players.js doesn't expose a win/loss helper, so we compute it here.
    const careerPpd = getCareerPPD(pid, G.variant);
    const wl        = getCareerWinLossX01(pid, G.variant);
    const avgText   = careerPpd !== null
      ? `avg ${careerPpd} · ${wl.wins}-${wl.losses}`
      : `${wl.wins}-${wl.losses}`;
    statsHtml += `<td class="ws-avg">${avgText}</td>`;
  });
  statsHtml += '</tr></table>';

  // ── 3. Show it ──
  showWin(
    winnerName,
    `<div style="margin-bottom:0.5rem;letter-spacing:0.08em">${subText}</div>${statsHtml}`,
    () => {
      document.getElementById('win-overlay').classList.remove('show');
      location.href = `../games/x01.html?start=${G.startScore}`;
    }
  );

  // ── 4. Clear this variant's save so Resume doesn't reappear ──
  try { localStorage.removeItem(saveKeyFor(G.startScore)); } catch (e) {}
}

// getCareerWinLossX01(pid, variant)
// Counts career wins/losses across x01 games for one player. Not provided
// by players.js, so we compute it locally from getGames() — the same
// shared darts_games array players.js reads and writes.
// variant → e.g. '501-single-in-double-out' | null (null = all x01 games)
function getCareerWinLossX01(pid, variant) {
  const games = getGames();
  let wins = 0, losses = 0;
  games.forEach(g => {
    if (g.gameType !== 'x01') return;
    if (variant && g.variant !== variant) return;
    const inGame = g.players.some(pl => pl.pid === pid);
    if (!inGame) return;
    if (g.winner === pid) wins++; else losses++;
  });
  return { wins, losses };
}

/* ══════════════════════════════════════
   CONTROLS
══════════════════════════════════════ */
document.getElementById('next-btn').addEventListener('click', () => nextPlayer(false));

document.getElementById('undo-btn').addEventListener('click', () => {
  if (!G.undoStack.length) { toast('NOTHING TO UNDO'); return; }
  const s = G.undoStack.pop();
  G.scores         = s.scores;
  G.dartsThrown    = s.dartsThrown;
  G.hasOpened      = s.hasOpened;
  G.history        = s.history;
  G.currentThrows  = s.currentThrows;
  G.currentPlayer  = s.currentPlayer;
  G.round          = s.round;
  G.turnStartScore = s.turnStartScore;
  G.openedThisTurn = s.openedThisTurn;
  mult = 1;
  renderAll();
  toast('UNDONE');
});

document.querySelectorAll('#mult-row .mbtn').forEach(b => {
  b.addEventListener('click', () => {
    mult = +b.dataset.m;
    document.querySelectorAll('#mult-row .mbtn').forEach(x =>
      x.classList.toggle('active', x === b)
    );
  });
});

document.getElementById('save-btn').addEventListener('click', () => { save(); toast('SAVED'); });
document.getElementById('end-btn').addEventListener('click', () => {
  if (confirm('End game and return to hub?')) location.href = '../index.html';
});

function save() {
  try { localStorage.setItem(saveKeyFor(G.startScore), JSON.stringify(G)); } catch (e) {}
}
</script>

<script>
(function () {
  if (!('wakeLock' in navigator)) {
    console.log('[WakeLock] Not supported on this browser.');
    return;
  }
  let wakeLock = null;
  async function acquireWakeLock() {
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      console.log('[WakeLock] Screen will stay on.');
      wakeLock.addEventListener('release', () => {
        console.log('[WakeLock] Released by browser.');
        wakeLock = null;
      });
    } catch (err) {
      console.warn('[WakeLock] Could not acquire:', err.name, err.message);
    }
  }
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && wakeLock === null) {
      acquireWakeLock();
    }
  });
  acquireWakeLock();
})();
</script>
